<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RuleForge — RedBlueDefence</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
/* ============================ THEME TOKENS ============================ */
:root{
  --purple: oklch(0.67 0.19 296);
  --purple-soft: oklch(0.67 0.19 296 / 0.14);
  --red: oklch(0.63 0.22 23);
  --blue: oklch(0.67 0.16 252);
  --accent: var(--purple);
  --accent-soft: var(--purple-soft);
  --radius: 16px;
  --mono: "JetBrains Mono", ui-monospace, monospace;
  --sans: "IBM Plex Sans", system-ui, sans-serif;
  --display: "Space Grotesk", var(--sans);
}
html[data-theme="dark"]{
  --bg: oklch(0.165 0.018 287);
  --bg-grad: oklch(0.205 0.03 290);
  --panel: oklch(0.205 0.02 287);
  --panel-2: oklch(0.235 0.022 287);
  --raised: oklch(0.255 0.024 287);
  --line: oklch(0.32 0.02 287);
  --line-soft: oklch(0.28 0.018 287);
  --text: oklch(0.965 0.008 287);
  --muted: oklch(0.72 0.014 287);
  --faint: oklch(0.56 0.016 287);
}
html[data-theme="light"]{
  --bg: oklch(0.975 0.005 287);
  --bg-grad: oklch(0.95 0.012 290);
  --panel: oklch(1 0 0);
  --panel-2: oklch(0.985 0.004 287);
  --raised: oklch(0.97 0.006 287);
  --line: oklch(0.9 0.008 287);
  --line-soft: oklch(0.93 0.006 287);
  --text: oklch(0.24 0.02 287);
  --muted: oklch(0.46 0.02 287);
  --faint: oklch(0.6 0.018 287);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  -webkit-font-smoothing: antialiased;
  line-height: 1.5;
}
body::before{
  content:""; position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(900px 520px at 82% -8%, color-mix(in oklch, var(--accent) 16%, transparent), transparent 70%),
    radial-gradient(720px 480px at -6% 4%, color-mix(in oklch, var(--blue) 12%, transparent), transparent 68%),
    radial-gradient(640px 600px at 50% 120%, color-mix(in oklch, var(--red) 8%, transparent), transparent 70%);
}
::selection{ background: color-mix(in oklch, var(--accent) 38%, transparent); }
button{ font-family: inherit; cursor:pointer; color: inherit; }
a{ color: inherit; }

/* ============================ APP SHELL ============================ */
#root{ position:relative; z-index:1; }
.app{ max-width: 1180px; margin: 0 auto; padding: 22px 28px 96px; }
.topbar{
  position: sticky; top:0; z-index: 40;
  display:flex; align-items:center; justify-content:space-between;
  padding: 14px 28px; margin: 0 -28px 8px;
  background: color-mix(in oklch, var(--bg) 78%, transparent);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--line-soft);
}
.topbar-right{ display:flex; align-items:center; gap:10px; }
.pill-link{
  display:flex; align-items:center; gap:7px; font-size:12.5px; color: var(--muted); white-space:nowrap;
  border:1px solid var(--line); padding:7px 13px; border-radius:999px; background: var(--panel);
  font-weight:500; letter-spacing:.01em;
}
.pill-link b{ color: var(--text); font-weight:600; }
.theme-toggle{
  display:flex; border:1px solid var(--line); border-radius:999px; overflow:hidden; background: var(--panel);
}
.theme-toggle button{ background:none; border:none; color: var(--faint); padding:7px 12px; font-size:12px; font-weight:600; }
.theme-toggle button.on{ background: var(--accent); color:#fff; }

/* brand mark */
.brandmark{ position:relative; border-radius:9px; background: oklch(0.16 0.02 287);
  display:flex; align-items:center; justify-content:center; flex:none; overflow:hidden;
  box-shadow: inset 0 0 0 1px oklch(1 0 0 / 0.08), 0 4px 14px -6px var(--accent); }
.bm-plane{ position:absolute; width:62%; height:62%; border-radius:50%; mix-blend-mode: screen; }
.bm-red{ background: oklch(0.62 0.23 24); left:11%; top:18%; }
.bm-blue{ background: oklch(0.6 0.2 254); right:11%; top:18%; }
.bm-core{ position:absolute; width:18%; height:18%; border-radius:50%; background: oklch(0.78 0.15 300); bottom:14%; }

/* split diamond (default) */
.bm-diamond{ position:absolute; left:21%; top:21%; width:58%; height:58%; border-radius:5px; transform: rotate(45deg);
  background: linear-gradient(90deg, oklch(0.62 0.23 24) 0 46%, oklch(0.72 0.18 312) 46% 54%, oklch(0.6 0.2 254) 54% 100%);
  box-shadow: 0 0 14px -3px oklch(0.7 0.18 305); }
.bm-diamond-core{ position:absolute; left:41.5%; top:41.5%; width:17%; height:17%; border-radius:50%; background: oklch(0.92 0.06 305); }
/* radar */
.bm-ring{ position:absolute; border-radius:50%; }
.bm-ring-r{ width:72%; height:72%; left:14%; top:14%; border:2px solid oklch(0.62 0.22 24); }
.bm-ring-b{ width:42%; height:42%; left:29%; top:29%; border:2px solid oklch(0.62 0.2 254); }
.bm-ring-dot{ position:absolute; width:14%; height:14%; left:43%; top:43%; border-radius:50%; background: oklch(0.8 0.15 305); }
.bm-sweep{ position:absolute; left:50%; top:50%; width:34%; height:2px; margin-top:-1px; transform-origin:0 50%;
  background: linear-gradient(90deg, oklch(0.8 0.16 305), transparent); animation: sweep 3.2s linear infinite; }
@keyframes sweep{ to{ transform: rotate(360deg); } }
/* forge bolt */
.bm-forge-split{ position:absolute; inset:0; opacity:.3;
  background: linear-gradient(90deg, oklch(0.62 0.23 24) 0 50%, oklch(0.6 0.2 254) 50% 100%); }
.bm-forge-bolt{ position:relative; z-index:1; color: oklch(0.86 0.13 305); display:flex; filter: drop-shadow(0 0 6px oklch(0.7 0.18 305 / .7)); }
/* monogram */
.bm-mono{ font-family: var(--display); font-weight:700; font-size:16px; letter-spacing:-.04em; }
.bm-mono-r{ color: oklch(0.68 0.21 24); } .bm-mono-b{ color: oklch(0.66 0.18 254); margin-left:-1px; }
.wordmark{ display:flex; align-items:center; gap:11px; }
.wordmark-txt .wm-line{ font-family: var(--display); font-weight:700; font-size:16.5px; letter-spacing:-.01em; line-height:1; }
.wm-red{ color: oklch(0.66 0.21 24); } .wm-blue{ color: oklch(0.66 0.17 254); } .wm-def{ color: var(--text); }
.wm-sub{ display:flex; align-items:center; gap:7px; margin-top:6px; }
.wm-tag{ font-family: var(--display); font-size:10px; font-weight:700; letter-spacing:.1em; color:#fff;
  background: var(--accent); padding:2.5px 7px; border-radius:5px; line-height:1.2;
  box-shadow: 0 2px 8px -3px var(--accent); }
.wm-tagline{ font-family: var(--mono); font-size:10px; font-weight:600; letter-spacing:.12em; color: var(--muted); text-transform:uppercase; white-space:nowrap; }

/* ============================ HERO ============================ */
.hero{ padding: 30px 0 22px; max-width: 760px; display: flex; flex-direction: column; align-items: flex-start; }
.eyebrow{ display:inline-flex; align-items:center; gap:7px; font-family: var(--mono); font-size:11px;
  letter-spacing:.18em; color: var(--accent); border:1px solid color-mix(in oklch,var(--accent) 40%,transparent);
  padding:6px 12px; border-radius:999px; background: var(--accent-soft); }
.hero h1{ font-family: var(--display); font-weight:700; font-size: clamp(30px, 4.6vw, 50px); line-height:1.04;
  letter-spacing:-.025em; margin: 18px 0 14px; text-wrap: balance; }
.grad{ background: linear-gradient(100deg, var(--red), var(--purple) 48%, var(--blue));
  -webkit-background-clip:text; background-clip:text; color: transparent; }
.lede{ color: var(--muted); font-size: 16px; max-width: 620px; text-wrap: pretty; margin-bottom: 0; }
.lede b{ color: var(--text); }

/* ============================ COUNTDOWN WIDGET ============================ */
.countdown-banner {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  background: color-mix(in oklch, var(--accent) 6%, var(--panel));
  border: 1px solid color-mix(in oklch, var(--accent) 20%, var(--line));
  border-radius: var(--radius);
  padding: 16px 24px;
  margin-top: 24px;
  box-shadow: 
    0 8px 32px -8px color-mix(in oklch, var(--accent) 10%, transparent),
    inset 0 1px 0 0 oklch(1 0 0 / 0.05);
  align-self: flex-start;
  backdrop-filter: blur(8px);
  width: 100%;
  max-width: 400px;
}
.countdown-label {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: .12em;
  color: var(--accent);
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 6px;
}
.countdown-timer {
  display: flex;
  gap: 20px;
  justify-content: center;
  width: 100%;
}
.time-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  flex: 1;
  position: relative;
}
.time-block:not(:last-child)::after {
  content: ":";
  position: absolute;
  right: -12px;
  top: 2px;
  font-family: var(--display);
  font-size: 24px;
  font-weight: 700;
  color: var(--line);
  opacity: 0.5;
}
.time-val {
  font-family: var(--display);
  font-size: 32px;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
  text-shadow: 0 2px 10px color-mix(in oklch, var(--accent) 30%, transparent);
}
.time-lbl {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  margin-top: 6px;
  letter-spacing: 0.08em;
}

/* ============================ WORK GRID ============================ */
.work{ display:grid; grid-template-columns: 1.25fr 1fr; gap: 18px; margin-top: 26px; align-items:start; }
.panel{ background: var(--panel); border:1px solid var(--line); border-radius: var(--radius); overflow:hidden; }
.panel-head{ display:flex; align-items:center; justify-content:space-between; padding: 14px 16px; border-bottom:1px solid var(--line-soft); }
.panel-kicker{ display:flex; align-items:center; gap:8px; font-weight:600; font-size:13.5px; letter-spacing:.01em; }
.panel-kicker svg{ color: var(--accent); }
.multi-hint{ font-family: var(--mono); font-size:10.5px; color: var(--faint); letter-spacing:.04em; }

.tabs{ display:flex; gap:3px; background: var(--raised); padding:3px; border-radius:10px; }
.tab{ background:none; border:none; color: var(--faint); font-size:12px; font-weight:600; padding:6px 12px; border-radius:7px; text-transform:capitalize; }
.tab.on{ background: var(--panel); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,.18); }

.paste-wrap{ padding: 14px 16px 16px; }
.title-input{ width:100%; background: var(--raised); border:1px solid var(--line-soft); color: var(--text);
  border-radius:10px; padding:10px 12px; font-family: var(--display); font-weight:600; font-size:14px; margin-bottom:10px; outline:none; }
.title-input:focus{ border-color: var(--accent); }
.runbook-text{ width:100%; height: 320px; resize:vertical; background: var(--raised); border:1px solid var(--line-soft);
  color: var(--text); border-radius:12px; padding:14px; font-family: var(--mono); font-size:12.5px; line-height:1.65; outline:none; }
.runbook-text:focus{ border-color: var(--accent); }
.runbook-text::placeholder{ color: var(--faint); }
.char-count{ text-align:right; font-family: var(--mono); font-size:10.5px; color: var(--faint); margin-top:8px; }

.upload-zone{ margin:16px; height: 320px; border:1.5px dashed var(--line); border-radius:14px; background: var(--raised);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; transition: .15s; text-align:center; padding:20px; }
.upload-zone:hover{ border-color: var(--accent); background: var(--accent-soft); }
.upload-ic{ width:58px; height:58px; border-radius:16px; background: var(--panel); border:1px solid var(--line);
  display:flex; align-items:center; justify-content:center; color: var(--accent); }
.upload-main{ font-weight:600; font-size:14px; } .upload-sub{ font-family:var(--mono); font-size:11px; color: var(--faint); }

.samples{ padding:14px 16px 16px; display:flex; flex-direction:column; gap:10px; }
.sample-card{ text-align:left; background: var(--raised); border:1px solid var(--line-soft); border-radius:13px; padding:14px 15px; transition:.15s; }
.sample-card:hover{ border-color: var(--accent); transform: translateY(-1px); }
.sample-top{ display:flex; align-items:center; gap:9px; margin-bottom:8px; }
.sample-threat{ font-family: var(--mono); font-size:10.5px; color: var(--faint); letter-spacing:.03em; }
.sample-title{ font-family: var(--display); font-weight:600; font-size:14.5px; margin-bottom:9px; }
.sample-load{ display:flex; align-items:center; gap:6px; font-size:12px; color: var(--accent); font-weight:600; }

/* config */
.siem-grid{ display:grid; grid-template-columns: 1fr 1fr; gap:10px; padding:14px 16px; }
.siem-tile{ display:flex; align-items:center; gap:11px; background: var(--raised); border:1px solid var(--line-soft);
  border-radius:13px; padding:12px; position:relative; transition:.15s; }
.siem-tile:hover{ transform: translateY(-1px); }
.siem-tile.on{ background: var(--panel-2); }
.siem-meta{ flex:1; min-width:0; text-align:left; }
.siem-name{ font-weight:600; font-size:13.5px; color: var(--text); } .siem-lang{ font-family: var(--mono); font-size:10.5px; color: var(--faint); }
.siem-check{ width:20px; height:20px; border-radius:7px; border:1.5px solid var(--line); display:flex; align-items:center; justify-content:center; color:#fff; flex:none; }

.siem-badge{ position:relative; border-radius:11px; border:1.5px solid var(--line); display:flex; align-items:center; justify-content:center;
  font-family: var(--display); font-weight:700; flex:none; background: var(--panel); transition:.18s; }
.siem-badge-glyph{ font-size:15px; position:relative; z-index:1; }
.siem-badge-dot{ position:absolute; inset:0; border-radius:inherit; opacity:.1; }

/* version picker */
.ver-block{ margin: 2px 16px 4px; padding-top:14px; border-top:1px solid var(--line-soft); }
.ver-head{ display:flex; align-items:center; gap:7px; font-family: var(--mono); font-size:10px; letter-spacing:.16em;
  text-transform:uppercase; color: var(--faint); margin-bottom:11px; }
.ver-head svg{ color: var(--accent); }
.ver-hint{ text-transform:none; letter-spacing:.02em; color: var(--faint); opacity:.8; margin-left:2px; }
.ver-list{ display:flex; flex-direction:column; gap:8px; }
.ver-row{ display:flex; align-items:center; gap:10px; }
.ver-glyph{ width:22px; height:22px; border-radius:7px; color:#fff; font-family: var(--display); font-weight:700;
  font-size:12px; display:flex; align-items:center; justify-content:center; flex:none; }
.ver-name{ font-weight:600; font-size:13px; flex:1; white-space:nowrap; }
.ver-select-wrap{ position:relative; min-width:186px; }
.ver-select{ -webkit-appearance:none; appearance:none; width:100%; background: var(--raised); border:1px solid var(--line);
  color: var(--text); border-radius:9px; padding:9px 30px 9px 12px; font-family: var(--mono); font-size:12px; font-weight:500;
  outline:none; cursor:pointer; }
.ver-select:focus, .ver-select:hover{ border-color: var(--ac); }
.ver-caret{ position:absolute; right:11px; top:50%; transform:translateY(-50%); pointer-events:none; color: var(--ac); font-size:11px; }
.lane-ver{ font-family: var(--mono); font-size:10px; color: var(--faint); font-weight:500; }
.gs-vernote{ display:flex; align-items:flex-start; gap:9px; margin-top:11px; font-size:12.5px; color: var(--muted);
  background: var(--raised); border:1px solid var(--line-soft); border-radius:10px; padding:9px 11px; text-wrap:pretty; }
.vn-tag{ font-family: var(--mono); font-size:10px; font-weight:700; color:#fff; padding:2px 7px; border-radius:5px; flex:none; }

.includes{ padding: 4px 16px 16px; }
.includes-h{ font-family: var(--mono); font-size:10px; letter-spacing:.16em; text-transform:uppercase; color: var(--faint); margin-bottom:10px; }
.includes-grid{ display:grid; grid-template-columns:1fr 1fr; gap:7px; }
.include-chip{ display:flex; align-items:center; gap:7px; font-size:11.5px; color: var(--muted); background: var(--raised);
  border:1px solid var(--line-soft); padding:7px 10px; border-radius:999px; font-weight:500; }
.include-chip svg{ color: var(--accent); flex:none; }

.generate{ margin: 6px 16px 16px; width: calc(100% - 32px); border:none; border-radius:14px; padding:16px;
  background: linear-gradient(100deg, var(--red), var(--purple) 52%, var(--blue));
  color:#fff; font-family: var(--display); font-weight:700; font-size:15.5px;
  display:flex; align-items:center; justify-content:center; gap:9px; position:relative; transition:.16s;
  box-shadow: 0 10px 30px -12px var(--accent); }
.generate:hover{ transform: translateY(-1px); box-shadow: 0 16px 36px -12px var(--accent); }
.generate.disabled{ opacity:.42; filter:saturate(.5); cursor:not-allowed; transform:none; box-shadow:none; }
.gen-sub{ font-family: var(--mono); font-weight:500; font-size:10px; opacity:.85; letter-spacing:.04em;
  position:absolute; right:16px; top:50%; transform:translateY(-50%); }

/* severity */
.sev{ font-family: var(--mono); font-size:10px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; padding:3px 8px; border-radius:6px; }
.sev-crit{ background: color-mix(in oklch,var(--red) 22%,transparent); color: oklch(0.72 0.2 23); border:1px solid color-mix(in oklch,var(--red) 45%,transparent); }
.sev-high{ background: color-mix(in oklch,oklch(0.7 0.18 50) 18%,transparent); color: oklch(0.76 0.16 60); border:1px solid color-mix(in oklch,oklch(0.7 0.18 50) 40%,transparent); }
.sev-med{ background: color-mix(in oklch,var(--blue) 18%,transparent); color: oklch(0.74 0.14 252); border:1px solid color-mix(in oklch,var(--blue) 40%,transparent); }
.sev-low{ background: var(--raised); color: var(--muted); border:1px solid var(--line); }

/* ============================ PROCESSING ============================ */
.proc-screen{ padding-top: 18px; }
.proc-head{ display:flex; align-items:center; gap:16px; margin-bottom: 18px; }
.proc-orb{ width:46px; height:46px; border-radius:50%; position:relative; flex:none;
  background: radial-gradient(circle at 50% 50%, var(--accent), transparent 70%); }
.proc-orb span{ position:absolute; inset:0; border-radius:50%; border:1.5px solid var(--accent); opacity:.5; animation: ring 1.8s ease-out infinite; }
.proc-orb span:nth-child(2){ animation-delay:.6s; } .proc-orb span:nth-child(3){ animation-delay:1.2s; }
@keyframes ring{ 0%{ transform:scale(.5); opacity:.8; } 100%{ transform:scale(1.6); opacity:0; } }
.proc-title{ font-family: var(--display); font-weight:700; font-size:21px; }
.proc-sub{ color: var(--muted); font-size:13.5px; }
.proc-status{ margin-left:auto; font-family: var(--mono); font-size:11.5px; }
.proc-status .pulse{ color: var(--accent); animation: blink 1.1s infinite; }
.proc-status .ready{ color: oklch(0.7 0.16 150); display:flex; align-items:center; gap:5px; }
@keyframes blink{ 50%{ opacity:.4; } }

.terminal{ background: oklch(0.13 0.016 287); border:1px solid var(--line); border-radius:14px; overflow:hidden; box-shadow: 0 24px 60px -30px rgba(0,0,0,.7); }
.term-bar{ display:flex; align-items:center; gap:12px; padding:10px 14px; border-bottom:1px solid oklch(0.24 0.02 287);
  font-family: var(--mono); font-size:11px; color: oklch(0.6 0.02 287); }
.cb-dots{ display:flex; gap:6px; } .cb-dots i{ width:11px; height:11px; border-radius:50%; background: oklch(0.32 0.02 287); }
.cb-dots i:nth-child(1){ background: oklch(0.6 0.2 25); } .cb-dots i:nth-child(2){ background: oklch(0.78 0.15 80); } .cb-dots i:nth-child(3){ background: oklch(0.7 0.16 150); }
.term-body{ padding:16px 18px; height: 340px; overflow-y:auto; font-family: var(--mono); font-size:12.5px; line-height:1.9; }
.term-line{ display:flex; gap:11px; align-items:flex-start; }
.tl-txt{ white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-width:0; }
.tl-gutter{ width:12px; flex:none; color: oklch(0.45 0.02 287); text-align:center; }
.tl-sys .tl-txt{ color: oklch(0.85 0.02 287); }
.tl-muted .tl-txt{ color: oklch(0.5 0.02 287); }
.tl-step .tl-txt{ color: oklch(0.82 0.03 290); }
.tl-tool{ } .tl-tool .tl-gutter{ color: var(--accent); } .tl-tool .tl-txt{ color: oklch(0.72 0.1 296); }
.tl-ok .tl-gutter{ color: oklch(0.7 0.16 150); } .tl-ok .tl-txt{ color: oklch(0.72 0.05 160); }
.tl-siem{ margin: 8px 0 2px; font-weight:600; }
.cursor{ display:inline-block; width:8px; height:15px; background: var(--accent); animation: blink .9s steps(2) infinite; vertical-align:middle; }

.lanes{ display:flex; gap:12px; margin-top:16px; flex-wrap:wrap; }
.lane{ flex:1; min-width:160px; display:flex; align-items:center; gap:10px; background: var(--panel); border:1px solid var(--line); border-radius:12px; padding:11px 13px; }

.rb-sub{ color: var(--muted); font-size:13px; }

.rb-stat{ font-size:13px; color: var(--muted); } .rb-stat b{ color: var(--text); font-family: var(--display); font-size:16px; }

.siem-switch{ display:flex; gap:8px; margin-bottom:18px; flex-wrap:wrap; }

.sw-glyph{ width:20px; height:20px; border-radius:6px; color:#fff; font-family: var(--display); font-weight:700; font-size:12px; display:flex; align-items:center; justify-content:center; }
.sw-lang{ font-family: var(--mono); font-size:10px; color: var(--faint); font-weight:500; }

.guide{ display:flex; flex-direction:column; gap:26px; }
.guide-summary{ display:flex; gap:16px; align-items:center; background: var(--panel); border:1px solid var(--line);

.gs-lang{ font-family: var(--mono); font-size:11px; letter-spacing:.06em; text-transform:uppercase; font-weight:600; margin-bottom:5px; }

.regen-btn{ display:flex; align-items:center; gap:7px; background: var(--panel-2); border:1px solid var(--line);

.regen-btn.spinning svg{ animation: spin .8s linear infinite; }
@keyframes spin{ to{ transform: rotate(360deg); } }
.gs-body p{ margin:0; font-size:15px; color: var(--text); text-wrap:pretty; }

.gsec{ }
.section-title{ display:flex; align-items:center; gap:11px; margin-bottom:14px; }
.section-n{ font-family: var(--mono); font-size:11px; color: var(--faint); font-weight:600; }

.ds-chips{ display:flex; flex-wrap:wrap; gap:9px; }

.mitre-id{ font-family: var(--mono); font-weight:700; font-size:14px; color: var(--accent); }

.step::before{ content:""; position:absolute; left:16px; top:34px; bottom:-2px; width:1.5px; background: var(--line); }
.step:last-child::before{ display:none; }

.step-title{ font-weight:600; font-size:14.5px; margin-bottom:3px; }
.step-detail{ color: var(--muted); font-size:13.5px; text-wrap:pretty; }

.cb-line{ display:flex; padding:0 16px; }
.cb-line:hover{ background: oklch(0.17 0.02 287); }

.two-col{ display:grid; grid-template-columns:1fr 1fr; gap:24px; }
.checklist{ list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:10px; }

.doclinks{ display:flex; flex-direction:column; gap:9px; }

.foot-btn.primary{ background: var(--accent); border-color: var(--accent); color:#fff; }

function highlight(code, lang) {
  const esc = (s) => s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  const kw = "from|where|by|stats|tstats|eval|table|sum|min|max|count|sequence|process|join|in|and|or|not|let|select|group|having|order|limit|rename|sort|dedup|fields|search|index|sourcetype|datamodel|summariesonly|span|true|false|ilike|like|as|on|with|runs|maxspan|authentication|summarize|project|extend|countif|minif|maxif|ago|bin|distinct|take|top|has|contains|dynamic|materialize|parse|datetime";
  const master = new RegExp(
    "((?:#|\\/\\/|--)[^\\n]*)" +
    "|(\"[^\"\\n]*\"|'[^'\\n]*')" +
    "|(\\bT\\d{4}(?:\\.\\d{3})?\\b|\\b46\\d\\d\\b|\\b70\\d\\d\\b)" +
    "|(\\b\\d+(?:\\.\\d+)?\\b)" +
    "|(\\b(?:" + kw + ")\\b)",
    "gi"
  );
  let out = "", last = 0, m;
  while ((m = master.exec(code)) !== null) {
    out += esc(code.slice(last, m.index));
    if (m[1]) out += `<span class="tk-com">${esc(m[1])}</span>`;
    else if (m[2]) out += `<span class="tk-str">${esc(m[2])}</span>`;
    else if (m[3]) out += `<span class="tk-id">${esc(m[3])}</span>`;
    else if (m[4]) out += `<span class="tk-num">${esc(m[4])}</span>`;
    else if (m[5]) out += `<span class="tk-kw">${esc(m[5])}</span>`;
    last = m.index + m[0].length;
    if (m[0].length === 0) master.lastIndex++;
  }
  out += esc(code.slice(last));
  return out;
}

function CountdownTimer() {
  // Target is June 27, 2026, 14:57:00 (Exactly 20 days from June 7, 2026, 2:57 PM)
  const targetDate = useMemo(() => new Date("2026-06-27T14:57:00").getTime(), []);
  const [timeLeft, setTimeLeft] = useState({ days: 20, hours: 0, minutes: 0, seconds: 0 });

  useEffect(() => {
    const updateTimer = () => {
      const now = new Date().getTime();
      const difference = targetDate - now;

      if (difference <= 0) {
        setTimeLeft({ days: 0, hours: 0, minutes: 0, seconds: 0 });
        return;
      }

      const d = Math.floor(difference / (1000 * 60 * 60 * 24));
      const h = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const m = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
      const s = Math.floor((difference % (1000 * 60)) / 1000);

      setTimeLeft({ days: d, hours: h, minutes: m, seconds: s });
    };

    updateTimer();
    const interval = setInterval(updateTimer, 1000);
    return () => clearInterval(interval);
  }, [targetDate]);

  return (
    <div className="countdown-banner">
      <span className="countdown-label">🚀 OFFICIAL GO-LIVE COUNTDOWN</span>
      <div className="countdown-timer">
        <div className="time-block">
          <span className="time-val">{String(timeLeft.days).padStart(2, '0')}</span>
          <span className="time-lbl">days</span>
        </div>
        <div className="time-block">
          <span className="time-val">{String(timeLeft.hours).padStart(2, '0')}</span>
          <span className="time-lbl">hours</span>
        </div>
        <div className="time-block">
          <span className="time-val">{String(timeLeft.minutes).padStart(2, '0')}</span>
          <span className="time-lbl">mins</span>
        </div>
        <div className="time-block">
          <span className="time-val">{String(timeLeft.seconds).padStart(2, '0')}</span>
          <span className="time-lbl">secs</span>
        </div>
      </div>
    </div>
  );
}

function stripJson(raw) {
  if (!raw) return null;
  let s = String(raw).trim();
  // Using hex escaped sequences \x60 to prevent Markdown parser breakdown on three literal backticks
  s = s.replace(/^\x60\x60\x60(?:json)?/i, "").replace(/\x60\x60\x60$/, "").trim();
  const a = s.indexOf("{"), b = s.lastIndexOf("}");
  if (a === -1 || b === -1) return null;
  try { return JSON.parse(s.slice(a, b + 1)); } catch (e) { return null; }
}

function genericFallback(siem, runbook) {
  const fb = FALLBACK[siem.id];
  if (fb) {
    const clone = JSON.parse(JSON.stringify(fb));
    clone._fallback = true;
    return clone;
  }
  const base = FALLBACK.splunk;
  return {
    summary: `Detection for "${runbook.title}" implemented as a ${siem.name} rule using ${siem.lang}.`,
    dataSources: base.dataSources,
    mitre: base.mitre,
    steps: base.steps,
    ruleLang: siem.id === "splunk" ? "spl" : "sql",
    ruleCode: base.ruleCode,
    validation: base.validation,
    tuning: base.tuning,
    _fallback: true,
  };
}

async function generateForSiem(siem, runbook, version) {
  return new Promise((resolve) => {
    setTimeout(() => {
      resolve(genericFallback(siem, runbook));
    }, 400);
  });
}

function ProcessingScreen({ runbook, targets, versions, busy }) {
  const [lines, setLines] = useState([]);
  const log = useRef([]);
  const scroller = useRef(null);

  useEffect(() => {
    const merged = [];
    merged.push({ t: "sys", text: "ruleforge-compiler v1.8 · pipeline analysis active" });
    merged.push({ t: "muted", text: "engine: static_synthesizer · tasks: analyze_runbook, schema_verify, mapping_behavior" });
    merged.push({ t: "step", text: `Parsing runbook logical primitives for "${runbook.title}"…` });
    merged.push({ t: "ok", text: "successfully evaluated rule targets, event bounds & timing assertions" });
    targets.forEach((id) => {
      const s = SIEMS[id];
      const ver = (versions && versions[id]) || s.versions[0].v;
      merged.push({ t: "siem", text: `── ${s.name} ${ver} · ${s.lang} ──`, accent: s.accent });
      merged.push({ t: "tool", text: `load_schema  "${s.name} ${ver} telemetry framework definition"` });
      merged.push({ t: "ok", text: `loaded core syntax model from internal cache baseline` });
      merged.push({ t: "step", text: "processing signature attributes → standard matrix taxonomy mapping" });
      merged.push({ t: "ok", text: `generated deployment artifact block compatible with build branch ${ver} ✓` });
    });
    log.current = merged;
    setLines([]);
    let i = 0;
    let timer = null;
    let alive = true;
    const tick = () => {
      if (!alive || i >= merged.length) return;
      const item = merged[i];
      i++;
      setLines((prev) => [...prev, item]);
      timer = setTimeout(tick, 180 + Math.random() * 150);
    };
    timer = setTimeout(tick, 200);
    return () => { alive = false; if (timer) clearTimeout(timer); };
  }, [runbook, targets, versions]);

  useEffect(() => {
    if (scroller.current) scroller.current.scrollTop = scroller.current.scrollHeight;
  }, [lines]);

  const doneLog = lines.length >= log.current.length && log.current.length > 0;

  return (
    <div className="screen proc-screen">
      <div className="proc-head">
        <div className="proc-orb"><span /><span /><span /></div>
        <div>
          <div className="proc-title">Compiling detection templates</div>
          <div className="proc-sub">Mapping parameters against structural rulesets for {targets.length} SIEM{targets.length>1?"s":""} · {runbook.title}</div>
        </div>
        <div className="proc-status">{busy || !doneLog ? <span className="pulse">processing</span> : <span className="ready"><Icon.check s={14}/> finalized</span>}</div>
      </div>

      <div className="terminal">
        <div className="term-bar"><div className="cb-dots"><i/><i/><i/></div><span>compiler@ruleforge — analytics-shell</span></div>
        <div className="term-body" ref={scroller}>
          {lines.filter(Boolean).map((l, i) => (
            <div className={`term-line tl-${l.t}`} key={i} style={l.accent ? { color: l.accent } : null}>
              <span className="tl-gutter">{l.t === "tool" ? "›" : l.t === "ok" ? "✓" : l.t === "done" ? "✓" : l.t==="siem" ? "" : "•"}</span>
              <span className="tl-txt">{l.text}</span>
            </div>
          ))}
          <div className="term-line"><span className="tl-gutter">$</span><span className="cursor" /></div>
        </div>
      </div>

      <div className="lanes">
        {targets.map((id) => {
          const s = SIEMS[id];
          const ver = (versions && versions[id]) || s.versions[0].v;
          return (
            <div className="lane" key={id} style={{ "--ac": s.accent }}>
              <SiemBadge siem={s} active size={30} />
              <div className="lane-name">{s.name} <span className="lane-ver">{vlabel(ver)}</span></div>
              <div className="lane-bar"><span className="lane-fill" /></div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function ResultsScreen({ runbook, targets, versions, results, onReset, onRegenerate }) {
  const [active, setActive] = useState(targets[0]);
  const [regen, setRegen] = useState(false);
  const siem = SIEMS[active];
  const g = results[active];
  if (!g) return null;
  const ver = (versions && versions[active]) || g._version || siem.versions[0].v;

  async function doRegen() {
    if (regen) return;
    setRegen(true);
    try { await onRegenerate(active); } finally { setRegen(false); }
  }
  const mitreCount = new Set(targets.flatMap((t) => (results[t]?.mitre || []).map((m) => m.id))).size;

  return (
    <div className="screen results-screen">
      <div className="results-bar">
        <button className="back" onClick={onReset}><Icon.plus s={15} style={{ transform: "rotate(45deg)" }} /> New</button>
        <div className="rb-meta">
          <div className="rb-title">{runbook.title}</div>
          <div className="rb-sub">{runbook.threat || g.summary?.slice(0, 60)}</div>
        </div>
        <div className="rb-stats">
          {runbook.severity && <div className="rb-stat"><Severity level={runbook.severity} /></div>}
          <div className="rb-stat"><b>{targets.length}</b> SIEM{targets.length>1?"s":""}</div>
          <div className="rb-stat"><b>{mitreCount}</b> ATT&CK</div>
        </div>
      </div>

      {targets.length > 1 && (
        <div className="siem-switch">
          {targets.map((id) => {
            const s = SIEMS[id]; const on = id === active;
            return (
              <button key={id} className={`switch-tab ${on ? "on" : ""}`} onClick={() => setActive(id)}
                style={on ? { borderColor: s.accent, color: s.accent } : null}>
                <span className="sw-glyph" style={{ background: s.accent }}>{s.glyph}</span>
                {s.name}<span className="sw-lang">{vlabel((versions && versions[id]) || s.versions[0].v)} · {s.lang}</span>
              </button>
            );
          })}
        </div>
      )}

      <div className="guide">
        <div className="guide-summary" style={{ "--ac": siem.accent }}>
          <div className="gs-badge"><SiemBadge siem={siem} active size={44} /></div>
          <div className="gs-body">
            <div className="gs-langrow">
              <div className="gs-lang" style={{ color: siem.accent }}>{siem.name} {ver} · {siem.langFull}</div>
              <button className={`regen-btn ${regen ? "spinning" : ""}`} onClick={doRegen} disabled={regen}
                style={{ "--ac": siem.accent }} title="Re-evaluate rule architecture parameters">
                <Icon.refresh s={14} />{regen ? "Refreshing…" : "Refresh Asset"}
              </button>
            </div>
            <p>{g.summary}</p>
            {g.versionNote && <div className="gs-vernote"><span style={{ background: siem.accent }} className="vn-tag">{vlabel(ver)}</span>{g.versionNote}</div>}
          </div>
        </div>

        <section className="gsec">
          <SectionTitle n={1} icon={<Icon.doc s={16} />}>Required data sources</SectionTitle>
          <div className="ds-chips">
            {(g.dataSources || []).map((d, i) => <span className="ds-chip" key={i}><span className="ds-dot" />{d}</span>)}
          </div>
        </section>

        <section className="gsec">
          <SectionTitle n={2} icon={<Icon.target s={16} />}>MITRE ATT&CK® mapping</SectionTitle>
          <div className="mitre-grid">
            {(g.mitre || []).map((m, i) => (
              <a className="mitre-card" key={i} href={`https://attack.mitre.org/techniques/${(m.id||"").replace(".", "/")}`} target="_blank" rel="noreferrer">
                <div className="mitre-id">{m.id}</div>
                <div className="mitre-name">{m.name}</div>
                <div className="mitre-tactic">{m.tactic}</div>
              </a>
            ))}
          </div>
        </section>

        <section className="gsec">
          <SectionTitle n={3} icon={<Icon.layers s={16} />}>Step-by-step deployment in {siem.name} {ver}</SectionTitle>
          <div className="stepper">
            {(g.steps || []).map((s, i) => (
              <div className="step" key={i}>
                <div className="step-n" style={{ borderColor: siem.accent, color: siem.accent }}>{i + 1}</div>
                <div className="step-body">
                  <div className="step-title">{s.title}</div>
                  <div className="step-detail">{s.detail}</div>
                </div>
              </div>
            ))}
          </div>
        </section>

        <section className="gsec">
          <SectionTitle n={4} icon={<Icon.bolt s={16} />}>Detection rule — {siem.lang}</SectionTitle>
          <CodeBlock code={g.ruleCode} lang={g.ruleLang || "spl"} label={`${siem.lang} · ${siem.name} ${ver} · ${siem.config}`} />
        </section>

        <div className="two-col">
          <section className="gsec">
            <SectionTitle n={5} icon={<Icon.flask s={16} />}>Test &amp; validation</SectionTitle>
            <ul className="checklist">
              {(g.validation || []).map((v, i) => <li key={i}><span className="cl-ic"><Icon.check s={13} /></span>{v}</li>)}
            </ul>
          </section>
          <section className="gsec">
            <SectionTitle n={6} icon={<Icon.sliders s={16} />}>Tuning &amp; false-positives</SectionTitle>
            <ul className="checklist tuning">
              {(g.tuning || []).map((v, i) => <li key={i}><span className="cl-ic warn"><Icon.sliders s={12} /></span>{v}</li>)}
            </ul>
          </section>
        </div>

        <section className="gsec">
          <SectionTitle n={7} icon={<Icon.ext s={16} />}>Official {siem.name} {ver} documentation</SectionTitle>
          <div className="doclinks">
            {siem.docs.map((d, i) => (
              <a className="doclink" key={i} href={d.url} target="_blank" rel="noreferrer">
                <Icon.doc s={15} /><span>{d.title}</span><Icon.ext s={13} />
              </a>
            ))}
          </div>
        </section>

        <div className="guide-foot">
          <button className="foot-btn primary" onClick={() => navigator.clipboard?.writeText(g.ruleCode)}><Icon.copy s={15} /> Copy {siem.lang} rule</button>
          <button className="foot-btn" onClick={onReset}><Icon.plus s={15} /> Convert another runbook</button>
        </div>
      </div>
    </div>
  );
}

// ===========================================================================
// MAIN ENTRY APP MOUNTING LAYER
// ===========================================================================
function Root(){
  const [theme, setTheme] = useState(TWEAK_DEFAULTS.theme);
  const [accent, setAccent] = useState(TWEAK_DEFAULTS.accent);
  
  const [screen, setScreen] = useState("input");
  const [runbook, setRunbook] = useState(null);
  const [targets, setTargets] = useState(["splunk"]);
  const [results, setResults] = useState({});
  const [versions, setVersions] = useState({});
  const [busy, setBusy] = useState(false);

  useEffect(() => {
    document.documentElement.setAttribute("data-theme", theme);
    const a = ACCENTS[accent] || ACCENTS["#8b5cf6"];
    document.documentElement.style.setProperty("--accent", a);
    document.documentElement.style.setProperty("--accent-soft", a.replace(")", " / 0.14)").replace("oklch(", "oklch("));
  }, [theme, accent]);

  async function onGenerate(rb, tg, vers){
    setRunbook(rb); setTargets(tg); setVersions(vers); setResults({}); setScreen("processing"); setBusy(true);
    const started = Date.now();
    const entries = [];
    for (const id of tg) {
      const g = await generateForSiem(SIEMS[id], rb, vers[id] || SIEMS[id].versions[0].v);
      entries.push([id, g]);
    }
    const res = {}; entries.forEach(([id, g]) => res[id] = g);
    const minMs = 2600 + tg.length * 600;
    const wait = Math.max(0, minMs - (Date.now() - started));
    setTimeout(() => { setResults(res); setBusy(false); setScreen("results"); }, wait);
  }

  function reset(){ setScreen("input"); setRunbook(null); setTargets(["splunk"]); setResults({}); }

  async function regenerate(id){
    const g = await generateForSiem(SIEMS[id], runbook, (versions && versions[id]) || SIEMS[id].versions[0].v);
    setResults((r) => ({ ...r, [id]: g }));
  }

  return (
    <div className="app">
      <div className="topbar">
        <Wordmark />
        <div className="topbar-right">
          <span className="pill-link"><Icon.shield s={14} /> <b>Blue&nbsp;Team</b> · detection</span>
          <div className="theme-toggle">
            <button className={theme==="dark"?"on":""} onClick={()=>setTheme("dark")}>Dark</button>
            <button className={theme==="light"?"on":""} onClick={()=>setTheme("light")}>Light</button>
          </div>
        </div>
      </div>

      {screen==="input" && <InputScreen onGenerate={onGenerate} />}
      {screen==="processing" && runbook && <ProcessingScreen runbook={runbook} targets={targets} versions={versions} busy={busy} />}
      {screen==="results" && runbook && <ResultsScreen runbook={runbook} targets={targets} versions={versions} results={results} onReset={reset} onRegenerate={regenerate} />}

      <div className="twk-panel">
        <div className="twk-hd">
          <b>App Controls</b>
        </div>
        <div className="twk-body">
          <TweakSection label="Appearance" />
          <TweakRadio label="Theme" value={theme} options={["dark","light"]} onChange={(v)=>setTheme(v)} />
          <TweakColor label="Lead accent" value={accent} options={["#8b5cf6","#e0457b","#3b82f6","#ef4444"]} onChange={(v)=>setAccent(v)} />
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
})();
</script>
</body>
</html>
